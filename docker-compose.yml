version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Yuchen070620
      MYSQL_DATABASE: ds_visualizer
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      MYSQLHOST: mysql
      MYSQLPORT: "3306"
      MYSQLUSER: root
      MYSQLPASSWORD: Yuchen070620
      MYSQLDATABASE: ds_visualizer
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
