name: Build and Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend-node/**'
      - 'frontend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. 后端依赖 + Prisma Client
      - run: npm install
        working-directory: backend-node
      - run: npx prisma generate
        working-directory: backend-node

      # 2. 构建前端
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

      # 3. 复制前端产物到后端
      - run: cp -r frontend/dist backend-node/frontend-dist

      # Railway GitHub App 会自动检测并部署 backend-node 目录
