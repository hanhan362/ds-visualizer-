name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend-node/**'
      - 'frontend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. 安装后端依赖 + 生成 Prisma Client
      - run: npm install
        working-directory: backend-node
      - run: npx prisma generate
        working-directory: backend-node

      # 2. 构建前端
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

      # 3. 把前端构建产物复制到后端目录
      - run: cp -r frontend/dist backend-node/frontend-dist

      # 4. 安装 Railway CLI 并部署
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway up --service=ds-visualizer-api
        working-directory: backend-node
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
