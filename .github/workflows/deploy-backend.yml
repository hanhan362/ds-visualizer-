name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend-node/**'
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 安装后端依赖 + 生成 Prisma Client
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: backend-node
      - run: npx prisma generate
        working-directory: backend-node

      # 2. 构建前端
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

      # 3. 把前端构建产物复制到后端目录
      - run: cp -r frontend/dist backend-node/frontend-dist

      # 4. 部署到 Railway
      - name: Deploy to Railway
        uses: railwayapp/railway-deploy@v1
        with:
          service: ds-visualizer-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
