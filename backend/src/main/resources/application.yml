server:
  port: 8080

spring:
  application:
    name: ds-visualizer

  # ── 默认使用 H2（开箱即用）──
  datasource:
    url: jdbc:h2:mem:dsvisualizer;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true   # data.sql 在 Hibernate 建表后执行
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

---
# ── MySQL profile ──
# 激活方式：mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# 或设置环境变量 SPRING_PROFILES_ACTIVE=mysql
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:ds_visualizer}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:Yuchen070620}

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
